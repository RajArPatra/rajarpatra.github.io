<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="6" fill="#1a1d27"/>

  <!-- Hair (messy/wavy top) -->
  <path d="M9 13c0-5 3-8 7-8s7 3 7 8c1-1 1.5-3 1-5-.5-3-3.5-6-8-6s-7.5 3-8 6c-.5 2 0 4 1 5z" fill="#1a1a1a"/>
  <path d="M9.5 12c-.3-1 .5-4 2-5.5" stroke="#2a2a2a" stroke-width="0.5" fill="none"/>
  <path d="M22 11c.5-1 0-3.5-1.5-5" stroke="#2a2a2a" stroke-width="0.5" fill="none"/>

  <!-- Face -->
  <ellipse cx="16" cy="16" rx="6.5" ry="7.5" fill="#c68642"/>

  <!-- Glasses - clear/transparent frames -->
  <rect x="10" y="13.5" width="5" height="4" rx="1.2" fill="none" stroke="#d4c5b0" stroke-width="0.7" opacity="0.9"/>
  <rect x="17" y="13.5" width="5" height="4" rx="1.2" fill="none" stroke="#d4c5b0" stroke-width="0.7" opacity="0.9"/>
  <line x1="15" y1="15.2" x2="17" y2="15.2" stroke="#d4c5b0" stroke-width="0.5" opacity="0.9"/>

  <!-- Eyes with blink animation -->
  <g>
    <ellipse cx="12.5" cy="15.5" rx="1" ry="1" fill="#1a1a1a">
      <animate attributeName="ry" values="1;0.1;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.05;0.1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" calcMode="spline"/>
    </ellipse>
    <ellipse cx="19.5" cy="15.5" rx="1" ry="1" fill="#1a1a1a">
      <animate attributeName="ry" values="1;0.1;1" dur="4s" repeatCount="indefinite" keyTimes="0;0.05;0.1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" calcMode="spline"/>
    </ellipse>
  </g>

  <!-- Nose -->
  <path d="M16 16.5v2c-.8.3-1.2.2-1.5 0" fill="none" stroke="#a0703a" stroke-width="0.5" stroke-linecap="round"/>

  <!-- Smile animation -->
  <path d="M13.5 20 Q16 22.5 18.5 20" fill="none" stroke="#1a1a1a" stroke-width="0.6" stroke-linecap="round">
    <animate attributeName="d" values="M13.5 20 Q16 22.5 18.5 20;M13.5 20.2 Q16 23 18.5 20.2;M13.5 20 Q16 22.5 18.5 20" dur="3s" repeatCount="indefinite"/>
  </path>

  <!-- Teeth flash on wider smile -->
  <rect x="14.5" y="20" width="3" height="1.2" rx="0.3" fill="#fff" opacity="0.8">
    <animate attributeName="height" values="1.2;1.8;1.2" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Beard/stubble -->
  <path d="M11 19.5c0 3 2.2 5.5 5 5.5s5-2.5 5-5.5" fill="none" stroke="#2a2a2a" stroke-width="1.5" opacity="0.35"/>
  <path d="M12 21c.5 2.5 2 4 4 4s3.5-1.5 4-4" fill="none" stroke="#2a2a2a" stroke-width="1" opacity="0.25"/>

  <!-- Collar hint -->
  <path d="M11 23.5c-1 1-2.5 3-2.5 4.5h15c0-1.5-1.5-3.5-2.5-4.5" fill="#2d3d2d"/>
  <path d="M14 23l-1.5 4h7L18 23" fill="#1a2d1a"/>

  <!-- Subtle floating animation on whole avatar -->
  <animateTransform attributeName="transform" type="translate" values="0,0;0,-0.3;0,0" dur="2.5s" repeatCount="indefinite"/>
</svg>
